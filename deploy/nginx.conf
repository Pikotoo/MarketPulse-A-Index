# MarketPulse API — Nginx 反代配置
# 部署于香港服务器 /etc/nginx/sites-available/marketpulse

server {
    listen 80;
    server_name api.yourdomain.com;

    # 自动跳转 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL 证书 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志
    access_log /var/log/nginx/marketpulse_access.log;
    error_log /var/log/nginx/marketpulse_error.log;

    # IP 限速（每IP每秒10请求）
    limit_req_zone $binary_remote_addr zone=mplimit:10m rate=10r/s;
    limit_req zone=mplimit burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8898;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # 禁止直接访问 /api/v1/health 以外的非认证端点日志
    location = /favicon.ico {
        return 204;
    }
}
